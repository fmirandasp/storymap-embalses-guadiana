<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>Mapbox Storytelling</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link rel="icon" type="image/x-icon"
        href="https://raw.githubusercontent.com/mapbox/assembly/publisher-staging/src/svgs/mapbox.svg">
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js'></script>
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css' rel='stylesheet' />
    <script src="https://cdn.jsdelivr.net/npm/mapbox-gl-globe-minimap@1.2.0/dist/bundle.js"></script>
    <script src="https://unpkg.com/scrollama"></script>
        <!-- Flourish: cargar UNA vez para que los embeds funcionen -->
    <script src="https://public.flourish.studio/resources/embed.js" defer></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        a,
        a:hover,
        a:visited {
            color: #0071bc;
        }

        #map {
            top: 0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

/* =====================================================
   CAMBIO (DESAFIO 2): HEADER EN DOS COLUMNAS CON LOGO
   ===================================================== */
#header {
    margin: auto;
    width: 100%;
    position: relative;
    z-index: 5;

    display: flex;               /* Dos columnas */
    align-items: center;         /* Centrado vertical */
    justify-content: center;     /* Centrado horizontal */
    gap: 100px;                   /* Espacio entre logo y texto */
    padding: 5px 0;
}

/* Columna del texto */
#header-text {
    text-align: left;
}

/* Columna del logo */
#header-logo img {
    height: 160px;   /* 🔥 AQUÍ CAMBIAS EL TAMAÑO DEL LOGO */
}


/**
        #header {
            margin: auto;
            width: 100%;
            position: relative;
            z-index: 5;
        }
            */

        #header h1,
        #header h2,
        #header p {
            margin: 0;
            padding: 2vh 2vw;
            text-align: center;
        }

        #footer {
            width: 100%;
            min-height: 5vh;
            padding-top: 2vh;
            padding-bottom: 2vh;
            text-align: center;
            line-height: 25px;
            font-size: 13px;
            position: relative;
            z-index: 5;
        }

        #features {
            padding-top: 10vh;
            padding-bottom: 10vh;
        }

        .hidden {
            visibility: hidden;
        }

        .centered {
            width: 50vw;
            margin: 0 auto;
        }

        .lefty {
            width: 33vw;
            margin-left: 5vw;
        }

        .righty {
            width: 33vw;
            margin-left: 62vw;
        }

        .fully {
            width: 100%;
            margin: auto;
        }

        .light {
            color: #444;
            background-color: #fafafa;
        }

        .dark {
            color: oklch(18.537% 0.1071 270.22);
            background: linear-gradient(90deg, #c0d4e7, #4c7dd8);
        }

        .step {
            padding-bottom: 50vh;
            /* margin-bottom: 10vh; */
            opacity: 0.25;
        }

        .step.active {
            opacity: 0.9;
        }

        .step div {
            padding: 25px 50px;
            line-height: 25px;
            font-size: 13px;
        }

        .step img {
            width: 100%;
        }

        @media (max-width: 750px) {

            .centered,
            .lefty,
            .righty,
            .fully {
                width: 90vw;
                margin: 0 auto;
            }
        }

        /* Fix issue on mobile browser where scroll breaks  */
        .mapboxgl-canvas-container.mapboxgl-touch-zoom-rotate.mapboxgl-touch-drag-pan,
        .mapboxgl-canvas-container.mapboxgl-touch-zoom-rotate.mapboxgl-touch-drag-pan .mapboxgl-canvas {
            touch-action: unset;
        }

/* ===== TAMAÑOS PERSONALIZADOS PARA CADA GRÁFICO ===== */

        /* Capítulo 2 */
        #grafico-evolucion {
            width: 60vw;
            margin: 0 auto;
        }

        /* Capítulo 3 */
        #grafico-sunburst {
            width: 45vw;
            margin: 0 auto;
        }

        /* Capítulo 4 */
        #grafico-mapa {
            width: 50vw;
            margin: 0 auto;
        }    
        
        
/* =====================================================
   CAMBIO (DESAFIO 2): LIGHTBOX DE IMÁGENES DENTRO DEL STORY
   - Se abre al pinchar en la foto de capítulos "embalse"
   - Se muestra grande pero sin “salirse del story”
   ===================================================== */

#story { position: relative; } /* asegura contexto para el overlay */

.story-lightbox {
    position: fixed;     /* IMPORTANTE: relativo a #story */
    inset: 0;               /* ocupa solo el área del story */
    z-index: 9998;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(0,0,0,0.70);
}

.story-lightbox.is-open { display: flex; }

.story-lightbox__img {
    max-width: 96%;
    max-height: 92vh;       /* grande, pero sin desbordar pantalla */
    border-radius: 14px;
    box-shadow: 0 10px 35px rgba(0,0,0,0.35);
}

.story-lightbox__close {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 9999;
    border: 0;
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.9);
    font-size: 14px;
}


/* =====================================================
   CAMBIO (DESAFIO 2): EN MODO EXPLORAR, DEJAR PASAR LOS EVENTOS AL MAPA
   - El story “tapa” el mapa: por eso no se puede arrastrar/zoom
   - Con esta clase, el mapa recibe los eventos del ratón/táctil
   ===================================================== */
body.explore-mode #story {
    pointer-events: none;
}

body.explore-mode #map {
    pointer-events: auto;
}


    
/* =====================================================
   FIX (DESAFIO 2): en modo explorar, poner el MAPA por encima
   (z-index) y garantizar que reciba eventos
   ===================================================== */

/* Estado normal: story por encima, mapa debajo */
#map { z-index: 0; }
#story { position: relative; z-index: 5; }

/* Modo explorar: mapa por encima del story */
body.explore-mode #map { z-index: 10; }
body.explore-mode #story { z-index: 0; }

/* Además, en modo explorar el story NO captura eventos */
body.explore-mode #story { pointer-events: none; }
body.explore-mode #map { pointer-events: auto; }

</style>
</head>

<body>

    <div id="map"></div>
    <div id="story"></div>

    <script src="./config.js"></script>
    <script>
        var initLoad = true;
        var layerTypes = {
            'fill': ['fill-opacity'],
            'line': ['line-opacity'],
            'circle': ['circle-opacity', 'circle-stroke-opacity'],
            'symbol': ['icon-opacity', 'text-opacity'],
            'raster': ['raster-opacity'],
            'fill-extrusion': ['fill-extrusion-opacity'],
            'heatmap': ['heatmap-opacity']
        }

        var alignments = {
            'left': 'lefty',
            'center': 'centered',
            'right': 'righty',
            'full': 'fully'
        }

        function getLayerPaintType(layer) {
            var layerType = map.getLayer(layer).type;
            return layerTypes[layerType];
        }

        function setLayerOpacity(layer) {
            var paintProps = getLayerPaintType(layer.layer);
            paintProps.forEach(function (prop) {
                var options = {};
                if (layer.duration) {
                    var transitionProp = prop + "-transition";
                    options = { "duration": layer.duration };
                    map.setPaintProperty(layer.layer, transitionProp, options);
                }
                map.setPaintProperty(layer.layer, prop, layer.opacity, options);
            });
        }

        var story = document.getElementById('story');
        var features = document.createElement('div');
        features.setAttribute('id', 'features');



        /**
        var header = document.createElement('div');

        if (config.title) {
            var titleText = document.createElement('h1');
            titleText.innerText = config.title;
            header.appendChild(titleText);
        }

        if (config.subtitle) {
            var subtitleText = document.createElement('h2');
            subtitleText.innerText = config.subtitle;
            header.appendChild(subtitleText);
        }

        if (config.byline) {
            var bylineText = document.createElement('p');
            bylineText.innerText = config.byline;
            header.appendChild(bylineText);
        }

        if (header.innerText.length > 0) {
            header.classList.add(config.theme);
            header.setAttribute('id', 'header');
            story.appendChild(header);
        }
*/

        /* =====================================================
        CAMBIO (DESAFIO 2): HEADER CON LOGO + TEXTO
        ===================================================== */

        var header = document.createElement('div');

        if (config.title || config.subtitle || config.byline) {

            // Contenedor logo
            var logoContainer = document.createElement('div');
            logoContainer.setAttribute('id', 'header-logo');

            var logo = document.createElement('img');
            logo.src = './assets/LOGO VISUALIZACION DE DATOS.svg';
            logo.alt = 'Logotipo';
            logoContainer.appendChild(logo);

            // Contenedor texto
            var textContainer = document.createElement('div');
            textContainer.setAttribute('id', 'header-text');

            if (config.title) {
                var titleText = document.createElement('h1');
                titleText.innerText = config.title;
                textContainer.appendChild(titleText);
            }

            if (config.subtitle) {
                var subtitleText = document.createElement('h2');
                subtitleText.innerText = config.subtitle;
                textContainer.appendChild(subtitleText);
            }

            if (config.byline) {
                var bylineText = document.createElement('p');
                bylineText.innerText = config.byline;
                textContainer.appendChild(bylineText);
            }

            header.appendChild(logoContainer);
            header.appendChild(textContainer);

            header.classList.add(config.theme);
            header.setAttribute('id', 'header');
            story.appendChild(header);
        }


        config.chapters.forEach((record, idx) => {
            var container = document.createElement('div');
            var chapter = document.createElement('div');

            if (record.title) {
                var title = document.createElement('h3');
                title.innerText = record.title;
                chapter.appendChild(title);
            }

            if (record.image) {
                var image = new Image();
                image.src = record.image;
                chapter.appendChild(image);
            }

            if (record.description) {
                var story = document.createElement('p');
                story.innerHTML = record.description;
                chapter.appendChild(story);
            }

            container.setAttribute('id', record.id);
            container.classList.add('step');
            if (idx === 0) {
                container.classList.add('active');
            }

            /* CAMBIO (DESAFIO 2): marcar capítulos de embalse para activar lightbox solo ahí */
if (record.polygonName) {
    container.classList.add('is-embalse');
}

            chapter.classList.add(config.theme);
            container.appendChild(chapter);
            container.classList.add(alignments[record.alignment] || 'centered');
            if (record.hidden) {
                container.classList.add('hidden');
            }
            features.appendChild(container);
        });

        story.appendChild(features);

        /* =====================================================
   CAMBIO (DESAFIO 2): crear lightbox dentro de #story
   ===================================================== */
var lightbox = document.createElement('div');
lightbox.className = 'story-lightbox';
lightbox.innerHTML = `
    <button class="story-lightbox__close" type="button" aria-label="Cerrar">Cerrar ✕</button>
    <img class="story-lightbox__img" alt="Imagen ampliada">
`;
story.appendChild(lightbox);

var lightboxImg = lightbox.querySelector('.story-lightbox__img');
var lightboxClose = lightbox.querySelector('.story-lightbox__close');

function openLightbox(src, altText) {
    lightboxImg.src = src;
    lightboxImg.alt = altText || 'Imagen ampliada';
    lightbox.classList.add('is-open');
}

function closeLightbox() {
    lightbox.classList.remove('is-open');
    lightboxImg.src = '';
}

/* CAMBIO (DESAFIO 2): solo activar en imágenes de capítulos embalse */
story.addEventListener('click', function (e) {
    const img = e.target.closest('.step.is-embalse img');
    if (!img) return;

    // abre la misma imagen a gran tamaño
    openLightbox(img.src, img.alt);
});

/* Cerrar al pulsar botón */
lightboxClose.addEventListener('click', closeLightbox);

/* Cerrar al clicar en el fondo oscuro (pero no sobre la imagen) */
lightbox.addEventListener('click', function (e) {
    if (e.target === lightbox) closeLightbox();
});

/* Cerrar con ESC */
document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeLightbox();
});

        var footer = document.createElement('div');

        if (config.footer) {
            var footerText = document.createElement('p');
            footerText.innerHTML = config.footer;
            footer.appendChild(footerText);
        }

        if (footer.innerText.length > 0) {
            footer.classList.add(config.theme);
            footer.setAttribute('id', 'footer');
            story.appendChild(footer);
        }

        mapboxgl.accessToken = config.accessToken;

        var map = new mapboxgl.Map({
            container: 'map',
            style: config.style,
            center: config.chapters[0].location.center,
            zoom: config.chapters[0].location.zoom,
            bearing: config.chapters[0].location.bearing,
            pitch: config.chapters[0].location.pitch,
            interactive: true,
            projection: config.projection
        });

/* BLOQUEAR INTERACCIÓN INICIAL (modo storytelling) */
map.scrollZoom.disable();
map.doubleClickZoom.disable();
map.touchZoomRotate.disable();
map.dragPan.disable();
map.dragRotate.disable();
map.touchPitch.disable();
map.boxZoom.disable();
map.keyboard.disable();







        // Create a inset map if enabled in config.js
        if (config.inset) {
            map.addControl(
                new GlobeMinimap({ ...config.insetOptions }),
                config.insetPosition
            );
        }

        if (config.showMarkers) {
            var marker = new mapboxgl.Marker({ color: config.markerColor });
            marker.setLngLat(
        config.chapters[0].markerCenter || config.chapters[0].location.center
    ).addTo(map);
        }

/* =====================================================
   CAMBIO (DESAFIO 2): MODO EXPLORAR MAPA EN EL ÚLTIMO CAPÍTULO
   - Activa zoom, mover, rotar, teclado, etc. SOLO en "Explora el mapa"
   - Al salir de ese capítulo, vuelve a dejar el mapa bloqueado
   ===================================================== */

// Control de navegación (zoom +/- y brújula). Se añade solo en modo explorar.
var navControl = new mapboxgl.NavigationControl({ visualizePitch: true });
var navControlAdded = false;

// Activa interacción
window.enableExploreMode = function () {
    /* CAMBIO: dejar que el mapa reciba eventos (el story los estaba bloqueando) */
    document.body.classList.add('explore-mode');

    /* FIX: asegurar que el canvas recibe eventos */
    map.getCanvas().style.pointerEvents = 'auto';

    map.scrollZoom.enable();
    map.doubleClickZoom.enable();
    map.touchZoomRotate.enable();
    map.dragPan.enable();
    map.dragRotate.enable();
    map.touchPitch.enable();
    map.boxZoom.enable();
    map.keyboard.enable();

    map.getCanvas().style.cursor = 'grab';

    if (!navControlAdded) {
        map.addControl(navControl, 'top-right');
        navControlAdded = true;
    }
};

window.disableExploreMode = function () {
    /* CAMBIO: volver al modo storytelling (story vuelve a recibir eventos) */
    document.body.classList.remove('explore-mode');

    /* FIX: restaurar pointer-events del canvas */
    map.getCanvas().style.pointerEvents = '';

    map.scrollZoom.disable();
    map.doubleClickZoom.disable();
    map.touchZoomRotate.disable();
    map.dragPan.disable();
    map.dragRotate.disable();
    map.touchPitch.disable();
    map.boxZoom.disable();
    map.keyboard.disable();

    map.getCanvas().style.cursor = '';

    if (navControlAdded) {
        map.removeControl(navControl);
        navControlAdded = false;
    }
};





        // instantiate the scrollama
        var scroller = scrollama();


        map.on("load", function () {
            if (config.use3dTerrain) {
                map.addSource('mapbox-dem', {
                    'type': 'raster-dem',
                    'url': 'mapbox://mapbox.mapbox-terrain-dem-v1',
                    'tileSize': 512,
                    'maxzoom': 14
                });
                // add the DEM source as a terrain layer with exaggerated height
                map.setTerrain({ 'source': 'mapbox-dem', 'exaggeration': 1.5 });

                // add a sky layer that will show when the map is highly pitched
                map.addLayer({
                    'id': 'sky',
                    'type': 'sky',
                    'paint': {
                        'sky-type': 'atmosphere',
                        'sky-atmosphere-sun': [0.0, 0.0],
                        'sky-atmosphere-sun-intensity': 15
                    }
                });
            };


            /* =========================================================
               CAMBIO (DESAFIO 2): DIBUJAR POLÍGONOS DE EMBALSES + RESALTADO POR CAPÍTULO
               - Lee el GeoJSON desde ./data/pol-embalses.geojson
               - Crea una capa base (todos los polígonos) y una capa highlight (solo el del capítulo)
               - El capítulo indica qué polígono resaltar con: chapter.polygonName (ver config.js)
               ========================================================= */
            map.addSource('embalses-pol', {
                type: 'geojson',
                data: './data/pol-embalses.geojson'
            });

            // Capa base: todos los embalses con un estilo suave
            map.addLayer({
                id: 'embalses-pol-fill',
                type: 'fill',
                source: 'embalses-pol',
                paint: {
                    'fill-color': 'rgba(0, 120, 255, 0.18)',
                    'fill-outline-color': 'rgba(0, 120, 255, 0.9)',
                    'fill-opacity': 1
                }
            });

            // Capa highlight: se filtra al embalse activo del capítulo y cambia de color
            map.addLayer({
                id: 'embalses-pol-highlight',
                type: 'fill',
                source: 'embalses-pol',
                // Inicialmente no muestra nada
                filter: ['==', ['get', 'nombre'], ''],
                paint: {
                    'fill-color': '#e53935',
                    'fill-outline-color': '#e53935',
                    'fill-opacity': 0.45
                }
            });

            // Asegura que las etiquetas queden por encima del polígono (si existe esa capa en tu estilo)
            if (map.getLayer('embalses-labels')) {
                map.moveLayer('embalses-pol-fill', 'embalses-labels');
                map.moveLayer('embalses-pol-highlight', 'embalses-labels');
            }


            // setup the instance, pass callback functions
            scroller
                .setup({
                    step: '.step',
                    offset: 0.5,
                    progress: true
                })
                .onStepEnter(async response => {
                    var current_chapter = config.chapters.findIndex(chap => chap.id === response.element.id);
                    var chapter = config.chapters[current_chapter];

                    response.element.classList.add('active');
                    map[chapter.mapAnimation || 'flyTo'](chapter.location);

                    if (config.showMarkers) {

                        // Si el capítulo tiene polygonName (es un embalse), mostrar marker
                        if (chapter.polygonName) {

                            marker.getElement().style.display = '';

                            marker.setLngLat(
                                chapter.markerCenter || chapter.location.center
                            );

                        } else {
                            // Capítulos sin embalse (intro, gráficos, explorar...)
                            marker.getElement().style.display = 'none';
                        }
                    }
                    /* =========================================================
                       CAMBIO (DESAFIO 2): RESALTAR EL POLÍGONO DEL EMBALSE ACTIVO
                       - chapter.polygonName debe coincidir EXACTAMENTE con properties.nombre del GeoJSON
                         (ver ./data/pol-embalses.geojson)
                       - chapter.polygonColor es el color del resaltado (opcional)
                       ========================================================= */
                    if (map.getLayer('embalses-pol-highlight')) {
                        if (chapter.polygonName) {
                            const col = chapter.polygonColor || '#e53935';
                            map.setFilter('embalses-pol-highlight', ['==', ['get', 'nombre'], chapter.polygonName]);
                            map.setPaintProperty('embalses-pol-highlight', 'fill-color', col);
                            map.setPaintProperty('embalses-pol-highlight', 'fill-outline-color', col);
                        } else {
                            // Capítulos sin embalse (intro, gráficos, etc.): quitar resaltado
                            map.setFilter('embalses-pol-highlight', ['==', ['get', 'nombre'], '']);
                        }
                    }
                    if (chapter.onChapterEnter.length > 0) {
                        chapter.onChapterEnter.forEach(setLayerOpacity);
                    }
/* =====================================================
   CAMBIO (DESAFIO 2): activar/desactivar modo explorar por ID
   - No depende de callback en config.js
   - Si el capítulo es "explorar", el mapa se vuelve interactivo
   - En el resto, se bloquea otra vez
   ===================================================== */
if (chapter.id === 'explorar') {
    window.enableExploreMode();
} else {
    window.disableExploreMode();
}

/* (Opcional) si sigues usando callbacks para otros capítulos, mantenlos */
if (chapter.callback && chapter.id !== 'explorar') {
    window[chapter.callback]();
}

                if (chapter.rotateAnimation) {
                        map.once('moveend', () => {
                            const rotateNumber = map.getBearing();
                            map.rotateTo(rotateNumber + 180, {
                                duration: 30000, easing: function (t) {
                                    return t;
                                }
                            });
                        });
                    }
                    if (config.auto) {
                        var next_chapter = (current_chapter + 1) % config.chapters.length;
                        map.once('moveend', () => {
                            document.querySelectorAll('[data-scrollama-index="' + next_chapter.toString() + '"]')[0].scrollIntoView();
                        });
                    }
                })
                .onStepExit(response => {
                    /* CAMBIO (DESAFIO 2): al salir del capítulo explorar, bloquear mapa */
                    if (response.element.id === 'explorar') {
                        window.disableExploreMode();
                    }

                    var chapter = config.chapters.find(chap => chap.id === response.element.id);
                    response.element.classList.remove('active');
                    if (chapter.onChapterExit.length > 0) {
                        chapter.onChapterExit.forEach(setLayerOpacity);
                    }
                });


            if (config.auto) {
                document.querySelectorAll('[data-scrollama-index="0"]')[0].scrollIntoView();
            }
        });    

    </script>

</body>

</html>
